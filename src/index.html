<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethan Holbrook</title>
    <meta
      name="description"
      content="Ethan Holbrook's personal website — resume, CV, and photography."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ethanholbrook.github.io/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ethan Holbrook" />
    <meta
      property="og:description"
      content="Ethan Holbrook's personal website — resume, CV, and photography."
    />
    <meta property="og:url" content="https://ethanholbrook.github.io/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ethan Holbrook" />

    <!-- Icons (absolute URLs so Parcel leaves them untouched; files ship from static/) -->
    <link rel="icon" href="https://ethanholbrook.github.io/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="https://ethanholbrook.github.io/favicon.svg" />
    <link rel="apple-touch-icon" href="https://ethanholbrook.github.io/apple-touch-icon.png" />
    <link rel="manifest" href="https://ethanholbrook.github.io/site.webmanifest" />

    <!-- Structured data: tells Google the site name and that this is Ethan's site -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ethan Holbrook",
        "url": "https://ethanholbrook.github.io/"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ethan Holbrook",
        "url": "https://ethanholbrook.github.io/",
        "jobTitle": "PhD Candidate",
        "affiliation": {
          "@type": "CollegeOrUniversity",
          "name": "Purdue University"
        }
      }
    </script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <noscript>You need to enable Javascript to run this application.</noscript>
    <div id="app">
      <!-- Your react app will be rendered here -->
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
